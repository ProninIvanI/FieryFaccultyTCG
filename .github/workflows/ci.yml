name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  game-core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: game-core/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - uses: actions/upload-artifact@v4
        with:
          name: game-core-junit
          path: game-core/reports/junit.xml
      - uses: actions/upload-artifact@v4
        with:
          name: game-core-coverage
          path: game-core/coverage

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: server-junit
          path: server/reports/junit.xml
      - uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: server/coverage

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
      - run: npm run smoke

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-junit
          path: frontend/reports/junit.xml
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
